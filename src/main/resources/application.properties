# ──────────────────────────────────────────────
# SmartFest AI Platform — Application Config
# ──────────────────────────────────────────────

server.port=8080
spring.application.name=smartfest-ai

# ── Swagger / OpenAPI ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Gemini API Key (set via environment variable, do NOT hardcode here) ──
# Export in your shell: export GEMINI_API_KEY=your_key_here
gemini.api.key=${GEMINI_API_KEY:placeholder-set-your-key}
gemini.model.name=gemini-1.5-flash

# ── Recommendation API Settings ──
recommendation.top-n=5
recommendation.min-score=0.1

# ── Fraud Detection Settings ──
fraud.amount.threshold=10000
fraud.rapid.transaction.limit=3
fraud.rapid.transaction.window.minutes=2
fraud.kmeans.clusters=3
fraud.thread.pool.size=4

# ── Data file paths ──
data.events.csv=classpath:data/events.csv
data.transactions.json=classpath:data/transactions.json
data.users.json=classpath:data/users.json

# ── Logging ──
logging.level.com.smartfest=DEBUG
logging.level.org.springframework.web=INFO
